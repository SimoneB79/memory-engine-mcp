services:
  memory-engine:
    build: .
    container_name: memory-engine
    restart: unless-stopped
    ports:
      - "8085:8085"
    volumes:
      # Persistent SQLite database and generated session digests
      - memory-engine-data:/data

      # Optional: import your existing markdown notes one-way
      # Replace ./memory with your notes directory, or remove this mount.
      - ./memory:/workspace/memory:ro

      # Optional: OpenClaw session watcher input
      # Replace ./sessions with your OpenClaw session JSONL directory, or remove this mount.
      - ./sessions:/sessions:ro
    environment:
      - MEMORY_DB_PATH=/data/memory.db
      - MARKDOWN_SOURCE=/workspace/memory
      - MEMORY_HOST=0.0.0.0
      - MEMORY_PORT=8085
      - OPENCLAW_SESSIONS_DIR=/sessions
      - SESSION_DIGEST_DIR=/data/session_digests

volumes:
  memory-engine-data:
